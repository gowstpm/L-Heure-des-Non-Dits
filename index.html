<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Heure des Non Dits - Cash & Vulgaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0212 0%, #1e0533 100%);
            color: #f3e8ff;
            min-height: 100vh;
        }
        h1 { font-family: 'Playfair Display', serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
        }

        /* Texte non sélectionnable (sauf champs de formulaire) */
        p, h1, h2, h3, label, span, .radio-label span, .check-label span, .modal-container, .glass-card {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .radio-label input[type="radio"], .check-label input[type="checkbox"] { display: none; }
        .radio-label, .check-label { cursor: pointer; transition: all 0.2s ease; }
        .radio-label span, .check-label span {
            display: block;
            padding: 0.75rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 0.85rem;
        }
        .radio-label input[type="radio"]:checked + span, .check-label input[type="checkbox"]:checked + span {
            background: #9d174d;
            border-color: #f472b6;
            color: white;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(157, 23, 77, 0.4);
        }

        textarea, input[type="text"], input[type="email"], input[type="number"] {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            -webkit-user-select: text; /* allow selection inside inputs */
            user-select: text;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-container {
            max-height: 90vh;
            overflow-y: auto;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ef4444;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-red-600 uppercase tracking-tighter">L'Heure des Non Dits</h1>
            <p class="text-red-200 opacity-60 italic">C'est le moment de dire toutes les vérités.</p>
        </header>

        <!-- Formspree integrated form: submit will POST to your form endpoint -->
        <form id="quizForm" action="https://formspree.io/f/mkovkzqq" method="POST" class="space-y-6 pb-20">

            <!-- GDPR consent -->
            <div class="glass-card p-6 border border-red-900/30">
                <div class="grid grid-cols-1 gap-4">
                    <label class="flex items-center gap-3">
                        <input type="checkbox" id="rgpdConsent" name="rgpdConsent" required>
                        <span>J'accepte le traitement de mes données personnelles conformément au RGPD.</span>
                    </label>

                    <!-- Confirmation d'age après le consentement RGPD -->
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-2"><input type="radio" id="consentAgeYes" name="over18" value="yes" required><span>J'ai plus de 18 ans</span></label>
                        <label class="flex items-center gap-2"><input type="radio" id="consentAgeNo" name="over18" value="no"><span>Je n'ai pas 18 ans</span></label>
                    </div>

                    <!-- Sexe -->
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-2"><input type="radio" name="sexe" value="homme"><span>Homme</span></label>
                        <label class="flex items-center gap-2"><input type="radio" name="sexe" value="femme"><span>Femme</span></label>
                        <label class="flex items-center gap-2"><input type="radio" name="sexe" value="autre"><span>Autre / Préfère ne pas dire</span></label>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 border border-red-900/30">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="userName" name="user_name" class="p-3 rounded-lg focus:ring-2 focus:ring-red-600 outline-none" placeholder="Ton Prénom (optionnel)">
                    <input type="email" id="partnerEmail" name="partner_email" class="p-3 rounded-lg focus:ring-2 focus:ring-red-600 outline-none" placeholder="Email de ton/ta partenaire (optionnel)">
                </div>
            </div>

            <div id="questionsContainer" class="space-y-6"></div>

            <div class="text-center mt-10">
                <button type="submit" class="bg-red-800 hover:bg-red-700 text-white font-bold py-5 px-14 rounded-full transition-all shadow-[0_0_30px_rgba(153,27,27,0.4)] uppercase">Valider</button>
            </div>

            <!-- Hidden fields for Formspree (subject, cc). _cc may or may not be used depending on your Formspree plan. -->
            <input type="hidden" name="_subject" value="CONFIDENTIEL : Les vérités crades de L'Heure des Non Dits">
            <input type="hidden" name="_cc" value="hndformulaire@gmail.com">
            <input type="hidden" name="_language" value="fr">
        </form>

        <div id="resultsSection" class="hidden glass-card p-10 text-center">
            <h2 class="text-3xl font-bold text-red-600 mb-4 uppercase">Le dossier est prêt</h2>
            <p class="mb-8 text-gray-300">Tes vérités sont enregistrées. Prêt(e) à ce qu'il/elle lise tout ça ?</p>
            <button id="openMailBtn" class="bg-red-900 p-4 rounded-lg text-white font-bold hover:bg-red-800 transition-colors">Ouvrir la boîte ou revenir à la page</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="envisageableModal" class="modal-overlay">
        <div class="bg-black border border-red-600 p-8 rounded-2xl max-w-sm w-full text-center shadow-[0_0_50px_rgba(220,38,38,0.5)]">
            <h3 class="text-xl font-bold text-red-500 mb-4">MAIS... c'est envisageable ??</h3>
            <p class="text-gray-400 mb-6 italic" id="modalContext"></p>
            <div class="flex gap-4 justify-center">
                <button onclick="handleModalResponse('Oui, pourquoi pas')" class="bg-red-700 px-6 py-2 rounded font-bold hover:bg-red-600">OUI</button>
                <button onclick="handleModalResponse('Non, jamais')" class="bg-zinc-800 px-6 py-2 rounded font-bold hover:bg-zinc-700">NON</button>
            </div>
        </div>
    </div>

    <div id="followUpModal" class="modal-overlay">
        <div class="bg-black border border-red-600 p-8 rounded-2xl modal-container max-w-2xl w-full text-center shadow-[0_0_50px_rgba(220,38,38,0.5)] m-4">
            <h3 class="text-xl font-bold text-red-500 mb-4" id="followUpTitle">Précise un peu...</h3>
            <div id="followUpContent" class="mb-6"></div>
            <button onclick="closeFollowUp()" id="followUpSubmitBtn" class="bg-red-700 px-10 py-3 rounded-full font-bold hover:bg-red-600 transition-all uppercase tracking-widest text-sm">VALIDER</button>
        </div>
    </div>

    <script>
        const questions = [
            { id: 'q1', type: 'scale', text: "As-tu déjà utiliser le pied de ton/ta partenaire dans une baise ?" },
            { id: 'q2', type: 'scale', text: "T'es-tu déjà envoyé dans des chiottes, un parking ou tous types de lieux public ?" },
            { id: 'q3', type: 'scale', text: "As-tu déjà léché une boisson ou de la bouffe comme un ogre sur l'entrejambe de l'autre ?" },
            { id: 'q4', type: 'scale', text: "As-tu déjà craché sur la sale tête de ton/ta partenaire ?", hasFollowUp: 'crachat' },
            { id: 'q5', type: 'scale', text: "As-tu déjà filmer une baise ?" },
            { id: 'q6', type: 'scale', text: "As-tu déjà utilisé un gode ou un gros vibro pendant ?" },
            { id: 'q7', type: 'scale', text: "As-tu déjà baisé sauvagement pendant que tes darons (membre de la famille) ou tes potes étaient dans le même lieu ?" },
            { id: 'q8', type: 'scale', text: "As-tu déjà tenté de forcer le passage dans le cul sans lubrifiant, en mode barbare ?" },
            { id: 'q9', type: 'scale', text: "T'es-tu déjà fait ligoter comme une bête ?" },
            { id: 'q10', type: 'scale', text: "As-tu déjà kiffé recevoir des gifles/bifles de forrain pendant la baise ?" },
            { id: 'q11', type: 'scale', text: "As-tu déjà pris ou causé des vraies fessées ?", hasFollowUp: 'fessées' },
            { id: 'q12', type: 'scale', text: "As-tu déjà torturé ton/ta partenaire ?", hasFollowUp: 'torture' },
            { id: 'q13', type: 'scale', text: "As-tu déjà baisé comme un porc sur un balcon en espérant être vu par autrui ?" },
            { id: 'q14', type: 'scale', text: "As-tu déjà bandé/mouillé en imaginant ton/ta partenaire baiser avec un/une autre ?" },
            { id: 'q15', type: 'scale', text: "As-tu déjà voulu te taper un plan à trois (ou plus) avec une/un totale inconnue ?", hasFollowUp: 'plan_trois' },
            { id: 'section_beuteu', type: 'checklist', text: "Lieux de pénétration (cocher tout ce qui a déjà accueilli une beuteu dans vos baises) :", options: ["Vagin", "Anus", "Bouche", "Main", "Entre les seins", "Entre les cuisses", "Pieds", "Aisselles", "Oreille (sérieux ?)", "Nombril"] },
            { id: 'q16', type: 'scale', text: "As-tu déjà eu envie d'être traité(e) comme une chienne / un esclave (collier, laisse, ordres) ?" },
            { id: 'q17', type: 'scale', text: "As-tu déjà ejaculé sans prevenir comme un detraqué ? Homme uniquement"},
            { id: 'q18', type: 'scale', text: "As-tu déjà voulu simuler un viol, avec de la vraie résistance et de la brutalité ?" },
            { id: 'q19', type: 'scale', text: "As-tu déjà eu envie de te faire pisser dessus ou de m'arroser la gueule ?" },
            { id: 'q20', type: 'binary', text: "La pisse ?", options: ["Répugnant", "Avec plaisir"], hasFollowUp: 'pisse_flow' },
            { id: 'q21', type: 'binary', text: "La merde ?", options: ["Répugnant", "Avec plaisir"], hasFollowUp: 'merde_flow' },
            { id: 'q22', type: 'scale', text: "As-tu déjà reçu/rentrer une main entière/poing dans quelconque orifice humain ?", hasFollowUp: 'fist_flow' },
            { id: 'q23', type: 'checklist', text: "Ces choses sont sorties de ton corps pendant l'acte :", options: ["Pet/Pet de fouf", "Vomi", "Pisse", "Sang", "Larmes", "Gros glaire", "Rien, je suis propre"] },
            { id: 'q24', type: 'scale', text: "As-tu déjà avalé le jus de ton/ta partenaire ?" },
            { id: 'q25', type: 'scale', text: "As-tu déjà voulu jouer à l'inceste (frère/soeur, daron/fille) ?" },
            { id: 'q26', type: 'scale', text: "As-tu déjà baisé dans un lieu sacré ?" },
            { id: 'q27', type: 'binary', text: "L'idée de se droguer comme des porcs pour baiser sans aucune limite morale, t'en penses quoi ?", options: ["Chaud(e), je veux perdre le contrôle", "À tester, mais j'ai un peu peur", "Déjà fait, c'est incroyable", "Hors de question, trop dangereux"] },
            { id: 'q28', type: 'scale', text: "As-tu déjà blessé ton/ta partenaire ?", hasFollowUp: 'blessure' },
            { id: 'q29', type: 'range', text: "Quelle est la durée moyenne de tes baises ?", rangeMin: 0, rangeMax: 60, unit: 'min', hasFollowUp: 'duree' },
            { id: 'q30', type: 'range', text: "Globalement, es-tu satisfait(e) par ton/ta partenaire ?", rangeMin: 0, rangeMax: 100, unit: '%', hasFollowUp: 'satisfaction' }
        ];

        const scaleOptions = ["Oui, mais c'était nul à chier", "Oui, et régulièrement", "Oui, une fois", "Non"];
        const container = document.getElementById('questionsContainer');
        let currentModalQuestionId = null;
        let selectedLiquide = null;
        let selectedPisseMode = null;
        let selectedMerdeMode = null;

        questions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = "glass-card p-6 border-l-4 border-red-900 transition-all duration-300 hover:border-red-600";
            
            const numberLabel = q.type === 'checklist' ? '<i class="fa-solid fa-check-double text-red-600 mr-2"></i>' : `${i+1}. `;
            let html = `<p class="text-lg font-bold mb-4 text-gray-100">${numberLabel}${q.text}</p>`;

            if (q.type === 'scale' || q.type === 'binary') {
                const opts = q.type === 'binary' ? q.options : scaleOptions;
                html += `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-${opts.length} gap-2">`;
                opts.forEach(opt => {
                    html += `
                        <label class="radio-label">
                            <input type="radio" name="${q.id}" value="${opt}" required onchange="handleAnswerChange(this, '${q.id}', '${q.hasFollowUp || ''}')">
                            <span>${opt}</span>
                        </label>`;
                });
                html += `</div><div id="envisageable_${q.id}" class="mt-2 text-xs text-red-500 font-bold uppercase tracking-widest italic"></div>`;
            } else if (q.type === 'range') {
                const min = q.rangeMin || 0;
                const max = q.rangeMax || 100;
                const unit = q.unit || '';
                const initial = Math.round((max + min) / 2);
                
                html += `
                <div class="px-4">
                    <input type="range" name="${q.id}" id="range_${q.id}" min="${min}" max="${max}" value="${initial}" oninput="updateRangeLabel('${q.id}', this.value, '${unit}')" onchange="checkRangeFollowUp('${q.id}', this.value, '${q.hasFollowUp || ''}')">
                    <div class="flex justify-between mt-2 text-sm text-gray-400">
                        <span>Min</span>
                        <span id="label_${q.id}" class="text-red-500 font-bold">${initial}${unit}</span>
                        <span>Max</span>
                    </div>
                </div><div id="envisageable_${q.id}" class="mt-2 text-xs text-red-500 font-bold uppercase tracking-widest italic"></div>`;
            } else if (q.type === 'checklist') {
                html += `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">`;
                q.options.forEach(opt => {
                    html += `
                        <label class="check-label">
                            <input type="checkbox" name="${q.id}" value="${opt}">
                            <span>${opt}</span>
                        </label>`;
                });
                html += `</div>`;
            }
            card.innerHTML = html;
            container.appendChild(card);
        });

        function updateRangeLabel(id, val, unit) {
            let displayVal = val;
            if (id === 'q29' && parseInt(val) === 60) {
                displayVal = "60+";
            }
            document.getElementById(`label_${id}`).innerText = displayVal + unit;
        }

        function checkRangeFollowUp(id, val, followUpType) {
            if (followUpType === 'duree' && parseInt(val) < 10) {
                showFollowUp(id, 'duree_feedback');
            } else if (followUpType === 'satisfaction' && parseInt(val) < 50) {
                showFollowUp(id, 'tromperie');
            }
        }

        function handleAnswerChange(input, qId, followUpType) {
            if (input.value === "Non" || input.value === "Répugnant" || input.value === "Hors de question, trop dangereux") {
                currentModalQuestionId = qId;
                const qText = questions.find(q => q.id === qId).text;
                document.getElementById('modalContext').innerText = qText;
                document.getElementById('envisageableModal').style.display = 'flex';
                document.getElementById(`envisageable_${qId}`).innerText = "";
            } else {
                document.getElementById(`envisageable_${qId}`).innerText = "";
                if (followUpType) {
                    showFollowUp(qId, followUpType);
                }
            }
        }

        function showFollowUp(qId, type) {
            const content = document.getElementById('followUpContent');
            const title = document.getElementById('followUpTitle');
            const submitBtn = document.getElementById('followUpSubmitBtn');
            currentModalQuestionId = qId;
            
            document.getElementById('followUpModal').style.display = 'flex';
            submitBtn.onclick = () => closeFollowUp(type);

            if (type === 'fessées') {
                title.innerText = "C'était violent ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4">Jusqu'à laisser des marques ?</p>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Avec marques"><span>OUI (marques)</span></label>
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Juste pour chauffer"><span>NON (juste chauffer)</span></label>
                    </div>`;
            } else if (type === 'torture') {
                title.innerText = "À quel point ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4">à quel l'échelle :</p>
                    <textarea id="tortureScale" class="w-full p-3 rounded bg-zinc-900 border border-red-900/50 text-white focus:outline-none" rows="3" placeholder="Légère, sanglante, psychologique..."></textarea>`;
            } else if (type === 'blessure') {
                title.innerText = "Précise l'intention";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4">Comment ça s'est passé ?</p>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Intentionnellement"><span>Intentionnellement</span></label>
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Sans faire exprès"><span>Sans faire exprès</span></label>
                    </div>`;
            } else if (type === 'crachat') {
                title.innerText = "Quel liquide ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4 text-sm italic">C'était quoi exactement ?</p>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Bave"><span>Bave</span></label>
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Sperme"><span>Sperme</span></label>
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Les deux"><span>Les deux</span></label>
                    </div>
                    <div class="flex flex-col gap-2 mt-4">
                        <label class="text-xs text-gray-500 uppercase font-bold text-left">Autre (précise) :</label>
                        <input type="text" id="customCrachat" name="custom_crachat" class="w-full p-2 rounded bg-zinc-900 border border-red-900/50 text-white" placeholder="Liquide séminal, etc.">
                    </div>`;
            } else if (type === 'crachat_cible') {
                title.innerText = "Où ça ?";
                const isDouble = selectedLiquide === "Les deux";
                
                let checkboxGroup = (prefix) => `
                    <div class="grid grid-cols-2 gap-2">
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Visage"><span>Visage</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Bouche"><span>Bouche</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Seins"><span>Seins</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Sexe"><span>Sexe</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Cul"><span>Cul</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Cheveux"><span>Cheveux</span></label>
                    </div>`;

                if (isDouble) {
                    content.innerHTML = `
                        <div class="flex flex-col md:flex-row gap-6 text-left">
                            <div class="flex-1">
                                <h4 class="text-red-400 font-bold uppercase text-xs mb-3 border-b border-red-900/50 pb-1 text-center">Pour la Bave</h4>
                                ${checkboxGroup('target_bave')}
                            </div>
                            <div class="flex-1 border-t md:border-t-0 md:border-l border-red-900/50 pt-4 md:pt-0 md:pl-6">
                                <h4 class="text-red-400 font-bold uppercase text-xs mb-3 border-b border-red-900/50 pb-1 text-center">Pour le Sperme</h4>
                                ${checkboxGroup('target_sperme')}
                            </div>
                        </div>`;
                } else {
                    const label = selectedLiquide || "le fluide";
                    content.innerHTML = `
                        <p class="text-gray-300 mb-4 text-sm italic">Cible(s) pour ${label.toLowerCase()} :</p>
                        ${checkboxGroup('target_unique')}`;
                }
            } else if (type === 'pisse_flow' || type === 'merde_flow') {
                const label = type === 'pisse_flow' ? 'la pisse' : 'la merde';
                title.innerText = "Action ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4 text-sm italic">Tu préfères quoi pour ${label} ?</p>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <label class="radio-label"><input type="radio" name="mode_${qId}" value="Reçu"><span>Reçu ?</span></label>
                        <label class="radio-label"><input type="radio" name="mode_${qId}" value="Envoyé"><span>Envoyé ?</span></label>
                        <label class="radio-label"><input type="radio" name="mode_${qId}" value="Les deux"><span>Les deux</span></label>
                    </div>`;
            } else if (type === 'pisse_cible' || type === 'merde_cible') {
                const isPisse = type === 'pisse_cible';
                const selectedMode = isPisse ? selectedPisseMode : selectedMerdeMode;
                const isDouble = selectedMode === "Les deux";
                title.innerText = "Où ça ?";
                
                let checkboxGroup = (prefix) => `
                    <div class="grid grid-cols-2 gap-2">
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Visage"><span>Visage</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Bouche"><span>Bouche</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Corps"><span>Corps</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Sexe"><span>Sexe</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Cul"><span>Cul</span></label>
                        <label class="check-label"><input type="checkbox" name="${prefix}_${qId}" value="Cheveux"><span>Cheveux</span></label>
                    </div>`;

                if (isDouble) {
                    content.innerHTML = `
                        <div class="flex flex-col md:flex-row gap-6 text-left">
                            <div class="flex-1">
                                <h4 class="text-red-400 font-bold uppercase text-xs mb-3 border-b border-red-900/50 pb-1 text-center">En mode Reçu</h4>
                                ${checkboxGroup(isPisse ? 'pisse_recu' : 'merde_recu')}
                            </div>
                            <div class="flex-1 border-t md:border-t-0 md:border-l border-red-900/50 pt-4 md:pt-0 md:pl-6">
                                <h4 class="text-red-400 font-bold uppercase text-xs mb-3 border-b border-red-900/50 pb-1 text-center">En mode Envoyé</h4>
                                ${checkboxGroup(isPisse ? 'pisse_envoye' : 'merde_envoye')}
                            </div>
                        </div>`;
                } else {
                    content.innerHTML = `
                        <p class="text-gray-300 mb-4 text-sm italic">Cibles pour ${selectedMode} :</p>
                        ${checkboxGroup(isPisse ? 'pisse_unique' : 'merde_unique')}`;
                }
            } else if (type === 'pisse_avale' || type === 'merde_avale') {
                const isPisse = type === 'pisse_avale';
                title.innerText = "Dernière précision...";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4 text-sm italic">Une fois dans la bouche, c'est quoi le sort de ${isPisse ? 'la pisse' : 'la merde'} ?</p>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="radio-label"><input type="radio" name="final_action_${qId}" value="Avalé"><span>Avalé</span></label>
                        <label class="radio-label"><input type="radio" name="final_action_${qId}" value="Craché"><span>${isPisse ? 'Craché' : 'Etalé'}</span></label>
                    </div>`;
            } else if (type === 'fist_flow') {
                title.innerText = "Où ça ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4 text-sm italic">Dans quel(s) orifice(s) as-tu pratiqué/reçu le fist ?</p>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="check-label"><input type="checkbox" name="fist_target_${qId}" value="Vaginal"><span>Vaginal</span></label>
                        <label class="check-label"><input type="checkbox" name="fist_target_${qId}" value="Anal"><span>Anal</span></label>
                    </div>`;
            } else if (type === 'duree_feedback') {
                title.innerText = "Déjà fini ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4">Moins de 10 minutes ? Précise un peu :</p>
                    <div class="grid grid-cols-1 gap-2">
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Par choix"><span>Par choix</span></label>
                        <label class="radio-label"><input type="radio" name="follow_${qId}" value="Pas par choix et c'est un problème"><span>Pas par choix et c'est un problème</span></label>
                    </div>`;
            } else if (type === 'tromperie') {
                // exactly as requested: lowercase phrase for the satisfaction follow-up
                title.innerText = "Aïe...";
                content.innerHTML = `<p class="text-gray-300 text-xl font-bold text-red-500">bah trompe le/la</p>`;
            } else if (type === 'plan_trois') {
                title.innerText = "Plus de 3 ?";
                content.innerHTML = `
                    <p class="text-gray-300 mb-4">Tu as déjà envisagé (ou fait) plus ? Combien de personnes au total ?</p>
                    <div class="flex flex-col items-center gap-4">
                        <input type="number" id="nbParticipants" name="nb_participants" class="w-24 p-2 text-center text-xl font-bold rounded bg-zinc-900 border border-red-900/50 text-white" min="3" value="3">
                        <p class="text-xs text-zinc-500 italic">Laisse 3 si tu t'arrêtes là.</p>
                    </div>`;
            }
        }

        function handleModalResponse(val) {
            if (currentModalQuestionId) {
                document.getElementById(`envisageable_${currentModalQuestionId}`).innerText = `[ENVISAGEABLE : ${val.toUpperCase()}]`;
                document.getElementById('envisageableModal').style.display = 'none';
            }
        }

        function closeFollowUp(type) {
            const label = document.getElementById(`envisageable_${currentModalQuestionId}`);

            if (type === 'crachat') {
                let followVal = document.querySelector(`input[name="follow_${currentModalQuestionId}"]:checked`)?.value || 
                                 document.getElementById('customCrachat')?.value || "";
                selectedLiquide = followVal;
                label.innerText = `[LIQUIDE : ${followVal.toUpperCase()}]`;
                document.getElementById('followUpModal').style.display = 'none';
                setTimeout(() => showFollowUp(currentModalQuestionId, 'crachat_cible'), 300);
                return;
            }

            if (type === 'crachat_cible') {
                if (selectedLiquide === "Les deux") {
                    const baveTargets = Array.from(document.querySelectorAll(`input[name="target_bave_${currentModalQuestionId}"]:checked`)).map(el => el.value).join(', ');
                    const spermeTargets = Array.from(document.querySelectorAll(`input[name="target_sperme_${currentModalQuestionId}"]:checked`)).map(el => el.value).join(', ');
                    label.innerText += ` | CIBLES BAVE : ${baveTargets || 'Aucune'} | CIBLES SPERME : ${spermeTargets || 'Aucune'}`;
                } else {
                    const targets = Array.from(document.querySelectorAll(`input[name="target_unique_${currentModalQuestionId}"]:checked`)).map(el => el.value).join(', ');
                    label.innerText += ` | CIBLES : ${targets || 'Aucune'}`;
                }
            } else if (type === 'pisse_flow') {
                selectedPisseMode = document.querySelector(`input[name="mode_${currentModalQuestionId}"]:checked`)?.value;
                label.innerText = `[MODE : ${selectedPisseMode ? selectedPisseMode.toUpperCase() : 'NON SPECIFIÉ'}]`;
                document.getElementById('followUpModal').style.display = 'none';
                setTimeout(() => showFollowUp(currentModalQuestionId, 'pisse_cible'), 300);
                return;
            } else if (type === 'merde_flow') {
                selectedMerdeMode = document.querySelector(`input[name="mode_${currentModalQuestionId}"]:checked`)?.value;
                label.innerText = `[MODE : ${selectedMerdeMode ? selectedMerdeMode.toUpperCase() : 'NON SPECIFIÉ'}]`;
                document.getElementById('followUpModal').style.display = 'none';
                setTimeout(() => showFollowUp(currentModalQuestionId, 'merde_cible'), 300);
                return;
            } else if (type === 'pisse_cible') {
                let showAvaler = false;
                if (selectedPisseMode === "Les deux") {
                    const recu = Array.from(document.querySelectorAll(`input[name="pisse_recu_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                    const envoye = Array.from(document.querySelectorAll(`input[name="pisse_envoye_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                    label.innerText += ` | CIBLES REÇU : ${recu.join(', ') || 'Aucune'} | CIBLES ENVOYÉ : ${envoye.join(', ') || 'Aucune'}`;
                    if (recu.includes("Bouche") || envoye.includes("Bouche")) showAvaler = true;
                } else {
                    const targets = Array.from(document.querySelectorAll(`input[name="pisse_unique_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                    label.innerText += ` | CIBLES : ${targets.join(', ') || 'Aucune'}`;
                    if (targets.includes("Bouche")) showAvaler = true;
                }
                document.getElementById('followUpModal').style.display = 'none';
                if (showAvaler) setTimeout(() => showFollowUp(currentModalQuestionId, 'pisse_avale'), 300);
                return;
            } else if (type === 'merde_cible') {
                let showAvaler = false;
                if (selectedMerdeMode === "Les deux") {
                    const recu = Array.from(document.querySelectorAll(`input[name="merde_recu_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                    const envoye = Array.from(document.querySelectorAll(`input[name="merde_envoye_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                    label.innerText += ` | CIBLES REÇU : ${recu.join(', ') || 'Aucune'} | CIBLES ENVOYÉ : ${envoye.join(', ') || 'Aucune'}`;
                    if (recu.includes("Bouche") || envoye.includes("Bouche")) showAvaler = true;
                } else {
                    const targets = Array.from(document.querySelectorAll(`input[name="merde_unique_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                    label.innerText += ` | CIBLES : ${targets.join(', ') || 'Aucune'}`;
                    if (targets.includes("Bouche")) showAvaler = true;
                }
                document.getElementById('followUpModal').style.display = 'none';
                if (showAvaler) setTimeout(() => showFollowUp(currentModalQuestionId, 'merde_avale'), 300);
                return;
            } else if (type === 'pisse_avale' || type === 'merde_avale') {
                const finalAction = document.querySelector(`input[name="final_action_${currentModalQuestionId}"]:checked`)?.value;
                label.innerText += ` | ACTION : ${finalAction || 'Non précisé'}`;
            } else if (type === 'fist_flow') {
                const targets = Array.from(document.querySelectorAll(`input[name="fist_target_${currentModalQuestionId}"]:checked`)).map(el => el.value);
                label.innerText = `[ORIFICE(S) : ${targets.join(', ') || 'Aucun'}]`;
            } else if (type === 'duree_feedback') {
                const followVal = document.querySelector(`input[name="follow_${currentModalQuestionId}"]:checked`)?.value || "Non précisé";
                label.innerText = `[RETOUR : ${followVal.toUpperCase()}]`;
            } else if (type === 'tromperie') {
                label.innerText = `[CONSEIL : TROMPERIE CONSEILLÉE]`;
            } else if (type === 'plan_trois') {
                const nb = document.getElementById('nbParticipants').value || 3;
                label.innerText = `[NB PARTICIPANTS MAX : ${nb}]`;
            } else {
                let followVal = document.querySelector(`input[name="follow_${currentModalQuestionId}"]:checked`)?.value || 
                                 document.getElementById('tortureScale')?.value || "";
                if (followVal) label.innerText = `[PRÉCISION : ${followVal}]`;
            }

            document.getElementById('followUpModal').style.display = 'none';
        }

        // submit: validate age checkbox then POST to Formspree via fetch so the page doesn't redirect
        document.getElementById('quizForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // must confirm >18
            const ageYes = document.querySelector('input[name="over18"][value="yes"]');
            if (!ageYes || !ageYes.checked) {
                alert('Vous devez confirmer être majeur(e) (plus de 18 ans) pour continuer.');
                return;
            }

            const form = this;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Envoi...';

            const fd = new FormData(form);
            // add some helpful fields for the mail
            fd.append('_subject', `CONFIDENTIEL : Les vérités crades de L'Heure des Non Dits`);
            fd.append('_cc', 'hndformulaire@gmail.com');

            fetch(form.action, {
                method: 'POST',
                body: fd,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Valider';
                if (response.ok) {
                    form.classList.add('hidden');
                    document.getElementById('resultsSection').classList.remove('hidden');
                    window.scrollTo(0,0);
                } else {
                    response.json().then(json => {
                        alert('Erreur lors de l\'envoi : ' + (json.error || 'Veuillez réessayer.'));
                    }).catch(()=> alert('Erreur lors de l\'envoi.'));
                }
            }).catch(err => {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Valider';
                alert('Échec de l\'envoi : ' + err.message);
            });
        });

        // small helper in results to let user go back
        document.getElementById('openMailBtn').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
